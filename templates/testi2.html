<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='testi2.css') }}">
<script src="{{ url_for('static', filename='testi2.js') }}"></script>
<title>Slots</title>

</head>
<body>

<div class="topbar">
  <span>{{ username }}</span>
  <a href="/stats">stats</a>
  <a href="/logout">logout</a>
</div>

<h1>SLOTS</h1>

<div class="grid">
  <div class="cell" id="c00">♠</div><div class="cell" id="c01">♥</div><div class="cell" id="c02">♦</div>
  <div class="cell" id="c10">♣</div><div class="cell" id="c11">★</div><div class="cell" id="c12">♠</div>
  <div class="cell" id="c20">♥</div><div class="cell" id="c21">♦</div><div class="cell" id="c22">♣</div>
</div>

<div class="stats">
  credits <span id="credits">100</span> &nbsp;&nbsp; bet <span id="bet">1</span>
</div>

<div class="controls">
  <button onclick="betDown()">BET −</button>
  <button id="spin-btn" onclick="spin()">SPIN</button>
  <button onclick="betUp()">BET +</button>
</div>

<div id="result"></div>

<div class="history">
  <div class="history-title">Last 5 spins</div>
  <div class="history-list" id="history-list"></div>
</div>


</body>
</html>

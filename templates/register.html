<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="{{ url_for('static', filename='register.css') }}">
  <script src="{{ url_for('static', filename='register.js') }}"></script>
<title>Register</title>
</head>
<body>
<div class="box">
  <h1>REGISTER</h1>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="POST">
    <div style="display:flex;flex-direction:column;gap:10px;">
      <input type="text" name="username" placeholder="Username (min 3 chars)" autocomplete="off" required>
      <input type="password" name="password" placeholder="Password (min 4 chars)" required>
      <button type="submit">CREATE ACCOUNT</button>
    </div>
  </form>
  <div class="link">Have an account? <a href="/login">Log in</a></div>
</div>
</body>
</html>
